{% extends "base.html" %}
{% block title %}Home - Resume Clustering & Ranking Portal{% endblock %}
{% block head %}
  <!-- Animate.css for cool entrance animations -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <style>
    /* Hero Section - modern AI feel */
    .hero {
      position: relative;
      height: 80vh;
      background: linear-gradient(
        135deg,
        rgba(46,49,65,0.8),
        rgba(30,31,46,0.8)
      ), url('/static/images/hero-bg.jpg') no-repeat center center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      overflow: hidden;
      margin-top: 20px;
    }
    .hero-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 700px;
      color: #fff;
      padding: 0 15px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
    }
    .hero-content h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .hero-content p {
      font-size: 1.25rem;
      margin-bottom: 30px;
    }
    .btn-hero {
      font-size: 1.1rem;
      padding: 10px 40px;
      border-radius: 25px;
      font-weight: 600;
      background: linear-gradient(90deg, #2ed3de, #337ee9);
      border: none;
      color: #fff;
      transition: background-color 0.3s ease;
    }
    .btn-hero:hover {
      background: linear-gradient(90deg, #24bdc8, #2a6bcd);
      color: #fff;
    }
    @media (max-width: 768px) {
      .hero-content h1 {
        font-size: 2rem;
      }
      .hero-content p {
        font-size: 1rem;
      }
    }
  </style>
{% endblock %}
{% block content %}
  <div class="hero animate__animated animate__fadeIn">
    <div class="hero-overlay"></div>
    <div class="hero-content animate__animated animate__fadeInDown">
      <h1>Welcome to Resume Portal</h1>
      <p class="animate__animated animate__fadeInUp animate__delay-1s">
        Streamline your recruitment process with advanced resume clustering & ranking.
      </p>
      <a href="{{ url_for('clustering') }}" class="btn-hero animate__animated animate__zoomIn animate__delay-2s">
        Get Started
      </a>
    </div>
  </div>
{% endblock %}
